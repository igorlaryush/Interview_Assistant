<!DOCTYPE html>
<html>
<head>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
    }
    canvas {
      display: block;
    }
    #helper {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-family: sans-serif;
      pointer-events: none;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="helper">Drag to select area</div>
  <canvas id="canvas"></canvas>
  <script src="screenshot-overlay.js"></script>
</body>
</html>
